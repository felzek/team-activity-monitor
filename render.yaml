services:
  - type: web
    name: team-activity-monitor
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health/ready
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_ENV
        value: production
      - key: APP_BASE_URL
        sync: false # set this to the public Render URL after the first deploy
      - key: APP_TIMEZONE
        value: America/New_York
      - key: USE_RECORDED_FIXTURES
        value: "true"
      - key: TEAM_MEMBERS_CONFIG
        value: config/team-members.json
      - key: TRACKED_REPOS_CONFIG
        value: config/repos.json
      - key: FIXTURE_DIR
        value: fixtures/demo
      - key: DATABASE_PATH
        value: /tmp/team-activity-monitor.db
      - key: SESSION_SECRET
        generateValue: true
      - key: OLLAMA_BASE_URL
        sync: false # set this only if Render can reach your Ollama host
      - key: OLLAMA_MODEL
        value: qwen2.5:7b
      - key: OLLAMA_KEEP_ALIVE
        value: 10m
