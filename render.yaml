services:
  - type: web
    name: team-activity-monitor
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health/ready
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_ENV
        value: production
      - key: APP_BASE_URL
        sync: false # set this to the public Render URL after the first deploy
      - key: APP_TIMEZONE
        value: America/New_York
      # Set to "false" and supply real credentials below to query live Jira + GitHub APIs.
      - key: USE_RECORDED_FIXTURES
        value: "true"
      - key: TEAM_MEMBERS_CONFIG
        value: config/team-members.json
      - key: TRACKED_REPOS_CONFIG
        value: config/repos.json
      - key: FIXTURE_DIR
        value: fixtures/demo
      # --- Live Jira credentials (required when USE_RECORDED_FIXTURES=false) ---
      # - key: JIRA_BASE_URL
      #   sync: false  # e.g. https://your-org.atlassian.net
      # - key: JIRA_EMAIL
      #   sync: false  # service account email that owns the API token
      # - key: JIRA_API_TOKEN
      #   sync: false  # Atlassian API token (manage at id.atlassian.com)
      # --- Live GitHub credentials (required when USE_RECORDED_FIXTURES=false) ---
      # - key: GITHUB_TOKEN
      #   sync: false  # fine-grained PAT with repo:read scope on tracked repos
      - key: DATABASE_PATH
        value: /tmp/team-activity-monitor.db
      - key: SESSION_SECRET
        generateValue: true
      - key: OLLAMA_BASE_URL
        sync: false # set this only if Render can reach your Ollama host
      - key: OLLAMA_MODEL
        value: qwen2.5:7b
      - key: OLLAMA_KEEP_ALIVE
        value: 10m
