<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log In | Team Activity Monitor</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="auth-body">
    <main class="auth-shell">
      <section class="auth-panel">
        <a href="/" class="mini-brand">Team Activity Monitor</a>
        <p class="eyebrow">Welcome back</p>
        <h1>Sign in to your workspace</h1>
        <p class="auth-copy">
          Your account opens the organization dashboard, activity history, connector controls, and
          admin workflows for invites and audit review.
        </p>
        <form id="auth-form" class="auth-form" data-mode="login">
          <label>
            <span>Email</span>
            <input type="email" name="email" autocomplete="email" required />
          </label>
          <label>
            <span>Password</span>
            <input type="password" name="password" autocomplete="current-password" required />
          </label>
          <button type="submit" class="button-primary auth-button">Log in</button>
          <p id="auth-status" class="auth-status">Ready.</p>
        </form>
        <p class="auth-switch">
          Need an account?
          <a href="/register">Create one here</a>
        </p>
      </section>
    </main>
    <script src="/auth.js"></script>
  </body>
</html>
