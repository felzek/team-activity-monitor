name: Feature request
description: Propose a product, platform, or operational improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
    validations:
      required: true
  - type: textarea
    id: rollout
    attributes:
      label: Rollout or risk notes
