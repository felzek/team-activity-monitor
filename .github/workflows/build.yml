name: Build Container and Optional ECR Push

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: build-container-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Build image
        run: docker build -t team-activity-monitor:${GITHUB_SHA} .
      - name: Smoke test image
        run: |
          set -euo pipefail
          docker run -d --name tam-smoke -p 3000:3000 \
            -e NODE_ENV=production \
            -e APP_ENV=production \
            -e APP_BASE_URL=http://127.0.0.1:3000 \
            -e APP_TIMEZONE=America/New_York \
            -e USE_RECORDED_FIXTURES=true \
            -e TEAM_MEMBERS_CONFIG=config/team-members.json \
            -e TRACKED_REPOS_CONFIG=config/repos.json \
            -e FIXTURE_DIR=fixtures/demo \
            -e DATABASE_PATH=/tmp/team-activity-monitor.db \
            -e SESSION_SECRET=smoke-secret \
            team-activity-monitor:${GITHUB_SHA}

          cleanup() {
            docker logs tam-smoke || true
            docker rm -f tam-smoke >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3000/health/ready >/dev/null; then
              break
            fi
            sleep 1
          done

          curl -fsS http://127.0.0.1:3000/health/ready
      - name: Configure AWS credentials
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ECR_REPOSITORY != '' && secrets.AWS_DEPLOY_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to Amazon ECR
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ECR_REPOSITORY != '' && secrets.AWS_DEPLOY_ROLE_ARN != '' }}
        uses: aws-actions/amazon-ecr-login@v2
      - name: Push image to ECR
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ECR_REPOSITORY != '' && secrets.AWS_DEPLOY_ROLE_ARN != '' }}
        run: |
          docker tag team-activity-monitor:${GITHUB_SHA} ${ECR_REPOSITORY}:${GITHUB_SHA}
          docker push ${ECR_REPOSITORY}:${GITHUB_SHA}
