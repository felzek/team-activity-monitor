name: Build Container

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Build image
        run: docker build -t team-activity-monitor:${GITHUB_SHA} .
      - name: Configure AWS credentials
        if: ${{ vars.ECR_REPOSITORY != '' && secrets.AWS_DEPLOY_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to Amazon ECR
        if: ${{ vars.ECR_REPOSITORY != '' && secrets.AWS_DEPLOY_ROLE_ARN != '' }}
        uses: aws-actions/amazon-ecr-login@v2
      - name: Push image to ECR
        if: ${{ vars.ECR_REPOSITORY != '' && secrets.AWS_DEPLOY_ROLE_ARN != '' }}
        run: |
          docker tag team-activity-monitor:${GITHUB_SHA} ${ECR_REPOSITORY}:${GITHUB_SHA}
          docker push ${ECR_REPOSITORY}:${GITHUB_SHA}
