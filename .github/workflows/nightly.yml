name: Nightly Checks

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Fixture smoke
        env:
          USE_RECORDED_FIXTURES: "true"
        run: npm run smoke
